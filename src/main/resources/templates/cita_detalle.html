<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle de Cita</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .form-section {
            margin-bottom: 2rem;
        }
        .btn-salir {
            width: 200px;
            margin: 0 auto;
            display: block;
            background: #2563eb;
            color: #fff;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <!-- Datos del Dueño -->
        <div class="col-md-6 form-section">
            <h4>Datos del Dueño</h4>
            <div class="mb-3">
                <label>Nombre completo</label>
                <input type="text" class="form-control" th:value="${cita.dueno.nombreCompleto}" readonly>
            </div>
            <div class="mb-3">
                <label>DNI / RUC</label>
                <input type="text" class="form-control" th:value="${cita.dueno.dniRuc}" readonly>
            </div>
            <div class="mb-3">
                <label>Teléfono</label>
                <input type="text" class="form-control" th:value="${cita.dueno.telefono}" readonly>
            </div>
            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="text" class="form-control" th:value="${cita.dueno.correo}" readonly>
            </div>
            <div class="mb-3">
                <label>Dirección</label>
                <input type="text" class="form-control" th:value="${cita.dueno.direccion}" readonly>
            </div>
            <div class="mb-3">
                <label>Relación con la mascota</label>
                <input type="text" class="form-control" th:value="${cita.dueno.relacionConMascota}" readonly>
            </div>
        </div>
        <!-- Datos de la Mascota -->
        <div class="col-md-6 form-section">
            <h4>Datos de la Mascota</h4>
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" class="form-control" th:value="${cita.mascota.nombre}" readonly>
            </div>
            <div class="mb-3">
                <label>Especie</label>
                <input type="text" class="form-control" th:value="${cita.mascota.especie}" readonly>
            </div>
            <div class="mb-3">
                <label>Raza</label>
                <input type="text" class="form-control" th:value="${cita.mascota.raza}" readonly>
            </div>
            <div class="mb-3">
                <label>Sexo</label>
                <input type="text" class="form-control" th:value="${cita.mascota.sexo}" readonly>
            </div>
            <div class="mb-3">
                <label>Edad aproximada</label>
                <input type="text" class="form-control" th:value="${cita.mascota.edadAproximada}" readonly>
            </div>
            <div class="mb-3">
                <label>Número de microchip (opcional)</label>
                <input type="text" class="form-control" th:value="${cita.mascota.microchip}" readonly>
            </div>
        </div>
    </div>
    <button class="btn btn-salir mt-4">Salir</button>
</div>
</body>
</html>
